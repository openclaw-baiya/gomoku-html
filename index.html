<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五子棋</title>
  <style>
    body { font-family: system-ui, sans-serif; display:flex; flex-direction:column; align-items:center; margin:0; padding:20px; background:#f5f5f5; }
    canvas { background:#d8a45d; box-shadow:0 6px 20px rgba(0,0,0,.2); border-radius:8px; cursor:pointer; }
    .bar { margin:12px 0; display:flex; gap:10px; align-items:center; }
    button { padding:8px 14px; border:0; border-radius:8px; background:#222; color:#fff; }
  </style>
</head>
<body>
  <h2>五子棋（双人本地）</h2>
  <div class="bar"><span id="status">当前：黑棋</span><button id="reset">重新开始</button></div>
  <canvas id="board" width="600" height="600"></canvas>
  <script>
    const size=15, cell=40, pad=20;
    const board=Array.from({length:size},()=>Array(size).fill(0));
    let current=1, gameOver=false;
    const cvs=document.getElementById('board'), ctx=cvs.getContext('2d');
    const statusEl=document.getElementById('status');

    function drawGrid(){
      ctx.clearRect(0,0,cvs.width,cvs.height);
      for(let i=0;i<size;i++){
        ctx.beginPath(); ctx.moveTo(pad+i*cell,pad); ctx.lineTo(pad+i*cell,pad+(size-1)*cell); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(pad,pad+i*cell); ctx.lineTo(pad+(size-1)*cell,pad+i*cell); ctx.stroke();
      }
    }
    function drawStone(x,y,p){
      const cx=pad+x*cell, cy=pad+y*cell;
      ctx.beginPath(); ctx.arc(cx,cy,15,0,Math.PI*2);
      const g=ctx.createRadialGradient(cx-5,cy-5,2,cx,cy,16);
      if(p===1){ g.addColorStop(0,'#666'); g.addColorStop(1,'#000'); }
      else { g.addColorStop(0,'#fff'); g.addColorStop(1,'#ddd'); }
      ctx.fillStyle=g; ctx.fill();
    }
    function inRange(x,y){ return x>=0&&x<size&&y>=0&&y<size; }
    function checkWin(x,y,p){
      const dirs=[[1,0],[0,1],[1,1],[1,-1]];
      for(const[dX,dY] of dirs){
        let c=1;
        for(const s of [1,-1]){
          let nx=x+dX*s, ny=y+dY*s;
          while(inRange(nx,ny)&&board[ny][nx]===p){ c++; nx+=dX*s; ny+=dY*s; }
        }
        if(c>=5) return true;
      }
      return false;
    }
    function place(x,y){
      if(gameOver||!inRange(x,y)||board[y][x]) return;
      board[y][x]=current; drawStone(x,y,current);
      if(checkWin(x,y,current)){ gameOver=true; statusEl.textContent=(current===1?'黑棋':'白棋')+'胜利！'; return; }
      current=current===1?2:1; statusEl.textContent='当前：'+(current===1?'黑棋':'白棋');
    }
    cvs.addEventListener('click',e=>{
      const r=cvs.getBoundingClientRect();
      const x=Math.round((e.clientX-r.left-pad)/cell), y=Math.round((e.clientY-r.top-pad)/cell);
      place(x,y);
    });
    document.getElementById('reset').onclick=()=>{ for(let y=0;y<size;y++)for(let x=0;x<size;x++)board[y][x]=0; current=1; gameOver=false; statusEl.textContent='当前：黑棋'; drawGrid(); };
    drawGrid();
  </script>
</body>
</html>
